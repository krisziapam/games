<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scatter Slot Deluxe</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #4b2c82, #1e90ff);
    color: white;
    text-align: center;
}

h2 {
    margin: 10px;
}

/* SLOT CONTAINER */
.slot-container {
    width: 360px;
    margin: auto;
    background: linear-gradient(#6b3e12, #3a1f05);
    border-radius: 20px;
    padding: 10px;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
}

/* CELLS */
.cell {
    height: 65px;
    border-radius: 8px;
    background: linear-gradient(#fff, #ddd);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    position: relative;
    overflow: hidden;
}

/* CARD COLORS */
.red { color: red; }
.black { color: black; }

/* SCATTER STYLE */
.scatter {
    background: radial-gradient(circle, gold, orange);
    color: #5a2d0c;
    box-shadow: 0 0 10px gold;
    animation: glow 0.8s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 5px gold; }
    to { box-shadow: 0 0 20px yellow; }
}

/* SPIN BUTTON */
.spin-btn {
    margin-top: 12px;
    background: radial-gradient(circle, orange, red);
    border: none;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 10px black;
}

/* POPUP WIN */
#popup {
    position: fixed;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(gold, orange);
    color: red;
    padding: 25px;
    border-radius: 12px;
    display: none;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 1px 1px white;
    box-shadow: 0 0 20px black;
}

/* REEL SPIN EFFECT */
.spin {
    animation: spinY 0.3s linear infinite;
}

@keyframes spinY {
    0% { transform: translateY(-10px); }
    50% { transform: translateY(10px); }
    100% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<h2>🎰 Scatter Slot Deluxe</h2>

<div class="slot-container">

    <div class="top-bar">
        <div>💰 Coins: <span id="coins">1000</span></div>
        <div>✨ Multi: <span id="multi">x1</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <button class="spin-btn" onclick="spin()">SPIN</button>

</div>

<div id="popup"></div>

<script>
const grid = document.getElementById("grid");

let coins = 1000;
let multiplier = 1;
let spinning = false;

// SYMBOL SET (styled)
const symbols = [
    {text:"A♠", class:"black"},
    {text:"K♠", class:"black"},
    {text:"Q♥", class:"red"},
    {text:"J♦", class:"red"},
    {text:"♣", class:"black"},
    {text:"♥", class:"red"},
    {text:"♦", class:"red"},
    {text:"♠", class:"black"},
    {text:"🪙", class:"scatter"} // scatter coin
];

// CREATE GRID
for (let i = 0; i < 20; i++) {
    let cell = document.createElement("div");
    cell.classList.add("cell");
    grid.appendChild(cell);
}

// SPIN FUNCTION
function spin() {
    if (spinning) return;
    if (coins < 10) return showPopup("No coins!");

    spinning = true;
    coins -= 10;
    updateCoins();

    multiplier = [1,2,3,5][Math.floor(Math.random()*4)];
    document.getElementById("multi").textContent = "x" + multiplier;

    let cells = document.querySelectorAll(".cell");
    let scatterCount = 0;

    // animate per column
    for (let col = 0; col < 5; col++) {
        setTimeout(() => {
            for (let row = 0; row < 4; row++) {
                let i = row * 5 + col;
                let cell = cells[i];

                cell.className = "cell spin";

                setTimeout(() => {
                    let sym = symbols[Math.floor(Math.random()*symbols.length)];

                    cell.className = "cell";
                    cell.textContent = sym.text;

                    if (sym.class === "scatter") {
                        cell.classList.add("scatter");
                        scatterCount++;
                    } else {
                        cell.classList.add(sym.class);
                    }

                    if (col === 4 && row === 3) {
                        finishSpin(scatterCount);
                    }

                }, 300);

            }
        }, col * 200); // reel delay
    }
}

// FINISH SPIN
function finishSpin(scatterCount) {
    let win = 0;

    if (scatterCount >= 3) {
        win = 150 * multiplier;
        showPopup("✨ BIG WIN!\n" + win);
    } else {
        win = Math.floor(Math.random()*40) * multiplier;
        showPopup(win > 0 ? "WIN!\n" + win : "Try again!");
    }

    coins += win;
    updateCoins();
    spinning = false;
}

// UPDATE COINS
function updateCoins() {
    document.getElementById("coins").textContent = coins;
}

// POPUP
function showPopup(text) {
    let popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}
</script>

</body>
</html>

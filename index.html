<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Scatter Game</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #1e1e2f;
        color: white;
    }

    h1 {
        margin-top: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 10px;
        justify-content: center;
        margin: 20px;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        border-radius: 10px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background: #ff9800;
        color: white;
    }

    button:hover {
        background: #e68900;
    }

    .score {
        margin-top: 10px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>🎰 Fun Scatter Game</h1>

<div class="grid" id="grid"></div>

<button onclick="spin()">Spin</button>

<div class="score">Score: <span id="score">0</span></div>
<div id="result"></div>

<script>
const symbols = ["🍒", "🍋", "⭐", "🔔", "💎", "SC"]; // SC = Scatter
let score = 0;

const grid = document.getElementById("grid");

// Create grid
for (let i = 0; i < 9; i++) {
    let cell = document.createElement("div");
    cell.classList.add("cell");
    grid.appendChild(cell);
}

function spin() {
    let cells = document.querySelectorAll(".cell");
    let results = [];
    let scatterCount = 0;

    cells.forEach(cell => {
        let rand = symbols[Math.floor(Math.random() * symbols.length)];
        cell.textContent = rand;
        results.push(rand);

        if (rand === "SC") scatterCount++;
    });

    checkWin(results, scatterCount);
}

function checkWin(results, scatterCount) {
    let resultText = document.getElementById("result");

    // Simple row match logic
    let win = false;

    for (let i = 0; i < 9; i += 3) {
        if (
            results[i] === results[i + 1] &&
            results[i] === results[i + 2]
        ) {
            score += 10;
            win = true;
        }
    }

    // Scatter bonus
    if (scatterCount >= 3) {
        score += 20;
        resultText.innerHTML = "✨ Scatter Bonus! +20 points!";
    } else if (win) {
        resultText.innerHTML = "🎉 Line Win! +10 points!";
    } else {
        resultText.innerHTML = "Try again!";
    }

    document.getElementById("score").textContent = score;
}
</script>

</body>
</html>

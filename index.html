<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realistic Scatter Slot (Demo)</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#3a1c71, #1e90ff);
    color: white;
    text-align: center;
}

h2 {
    margin: 10px;
}

.slot-container {
    width: 340px;
    margin: auto;
    background: #4b2a0c;
    padding: 12px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    overflow: hidden;
}

.cell {
    background: #fff;
    color: black;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 5px;
    font-weight: bold;
    transition: transform 0.3s;
}

.scatter {
    background: gold;
    color: black;
}

.spin-btn {
    margin-top: 12px;
    background: orange;
    border: none;
    border-radius: 50%;
    width: 75px;
    height: 75px;
    font-size: 18px;
    cursor: pointer;
}

.spin-btn:active {
    transform: scale(0.95);
}

#popup {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: gold;
    color: red;
    padding: 20px;
    border-radius: 10px;
    display: none;
    font-size: 22px;
    font-weight: bold;
}

.reel-spin {
    animation: spinAnim 0.3s linear infinite;
}

@keyframes spinAnim {
    0% { transform: translateY(-10px); }
    50% { transform: translateY(10px); }
    100% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<h2>🎰 Scatter Slot (Realistic Demo)</h2>

<div class="slot-container">

    <div class="top-bar">
        <div>💰 Coins: <span id="coins">1000</span></div>
        <div>✨ Multi: <span id="multi">x1</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <button class="spin-btn" onclick="spin()">SPIN</button>

</div>

<div id="popup"></div>

<script>
const symbols = ["A","K","Q","J","♠","♥","♦","♣","SC"];
const grid = document.getElementById("grid");

let coins = 1000;
let multiplier = 1;
let spinning = false;

// create grid
for (let i = 0; i < 20; i++) {
    let cell = document.createElement("div");
    cell.classList.add("cell");
    grid.appendChild(cell);
}

function spin() {
    if (spinning) return;
    if (coins < 10) {
        showPopup("Not enough coins!");
        return;
    }

    spinning = true;
    coins -= 10;
    updateCoins();

    multiplier = [1,2,3,5][Math.floor(Math.random()*4)];
    document.getElementById("multi").textContent = "x" + multiplier;

    let cells = document.querySelectorAll(".cell");
    let scatterCount = 0;

    // Start animation
    cells.forEach(c => c.classList.add("reel-spin"));

    // Stop reels one by one
    cells.forEach((cell, index) => {
        setTimeout(() => {
            let rand = symbols[Math.floor(Math.random()*symbols.length)];
            cell.textContent = rand;

            cell.classList.remove("reel-spin");
            cell.classList.remove("scatter");

            if (rand === "SC") {
                scatterCount++;
                cell.classList.add("scatter");
            }

            // When last cell finishes
            if (index === cells.length - 1) {
                finishSpin(scatterCount);
            }

        }, index * 80); // stagger effect
    });
}

function finishSpin(scatterCount) {
    let win = 0;

    if (scatterCount >= 3) {
        win = 100 * multiplier;
        showPopup("✨ SCATTER BONUS!\n+" + win);
    } else {
        win = Math.floor(Math.random()*30) * multiplier;
        if (win > 0) {
            showPopup("🎉 WIN!\n+" + win);
        } else {
            showPopup("Try again!");
        }
    }

    coins += win;
    updateCoins();
    spinning = false;
}

function updateCoins() {
    document.getElementById("coins").textContent = coins;
}

function showPopup(text) {
    let popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 1800);
}
</script>

</body>
</html>
